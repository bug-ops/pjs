# cargo-deny configuration for PJS project
# https://embarkstudios.github.io/cargo-deny/

[graph]
targets = []
all-features = false
no-default-features = false

[advisories]
db-urls = ["https://github.com/rustsec/advisory-db"]
db-path = "~/.cargo/advisory-db"

# Ignore specific advisories
ignore = [
    # paste 1.0.x is unmaintained; tracked in follow-up to migrate to pastey
    { id = "RUSTSEC-2024-0436", reason = "paste is used for macro hygiene; migration to pastey tracked separately" },
]

[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "0BSD",
    "Zlib",
    "Unicode-DFS-2016",
    "MPL-2.0",
    # CDLA-Permissive-2.0 is required by webpki-root-certs (TLS root cert data
    # bundled by rustls-platform-verifier via reqwest). The license is permissive
    # and compatible with the project's MIT/Apache-2.0 dual-licensing.
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.8

[[licenses.clarify]]
name = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = []

[bans]
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"
workspace-default-features = "allow"
external-default-features = "allow"
allow = []
deny = []

# Skip false positives from feature-gated allocators
skip = [
    { name = "mimalloc", reason = "Feature-gated allocator" },
]
skip-tree = []

[sources]
unknown-registry = "warn"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
