name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  merge_group:
    branches: [main]
  schedule:
    # Weekly security scan on Saturday at 17:39 UTC
    - cron: '39 17 * * 6'
  workflow_dispatch:

permissions:
  contents: read
  statuses: write
  security-events: write
  actions: read
  pull-requests: write

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  CARGO_NET_RETRY: 10
  RUST_BACKTRACE: short
  RUSTFLAGS: "-D warnings"
  RUSTUP_MAX_RETRIES: 10

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Tier 0: path detection ────────────────────────────────────────────────
  # Detects which parts of the codebase changed so downstream jobs can be
  # conditionally skipped.  On push/schedule/workflow_dispatch every filter
  # evaluates to true so nothing is skipped.
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
      wasm: ${{ steps.filter.outputs.wasm }}
      js:   ${{ steps.filter.outputs.js }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            rust:
              - 'crates/pjs-core/**'
              - 'crates/pjs-domain/**'
              - 'crates/pjs-wasm/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'rust-toolchain.toml'
              - '.cargo/**'
            wasm:
              - 'crates/pjs-wasm/**'
              - 'crates/pjs-domain/**'
              - 'crates/pjs-core/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'rust-toolchain.toml'
            js:
              - 'crates/pjs-js-client/**'

  # ── Tier 1: entry gate ───────────────────────────────────────────────────
  # fmt + clippy gate.  Skipped when only JS files changed.
  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [changes]
    if: |
      needs.changes.outputs.rust == 'true' ||
      github.event_name == 'push' ||
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "quality"
          cache-on-failure: true

      - name: Check formatting
        run: cargo +nightly fmt --all --check

      - name: Run clippy (strict mode)
        run: cargo clippy --workspace --all-features --all-targets -- -D warnings

  # ── Tier 2a: build + archive ─────────────────────────────────────────────
  # Compiles tests and archives them with nextest --no-run.
  # 3 OS × 2 allocators = 6 parallel jobs (Windows skips mimalloc).
  # Each job uploads a nextest archive artifact consumed by the test job.
  build:
    name: Build (${{ matrix.os }}, ${{ matrix.allocator }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    needs: [changes, quality]
    if: |
      needs.changes.outputs.rust == 'true' ||
      github.event_name == 'push' ||
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch'
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        allocator: [system, mimalloc]
        include:
          - allocator: system
            features: "simd-auto,schema-validation,compression,http-server,http-client,websocket-client,websocket-server"
          - allocator: mimalloc
            features: "simd-auto,schema-validation,compression,http-server,http-client,websocket-client,websocket-server,mimalloc"
        exclude:
          - os: windows-latest
            allocator: mimalloc

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: llvm-tools-preview

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "build-${{ matrix.os }}-${{ matrix.allocator }}"
          cache-on-failure: true

      - uses: taiki-e/install-action@v2
        with:
          tool: nextest

      # Compile tests and produce a self-contained archive.  The archive
      # bundles test binaries + metadata so the test job can run without
      # recompiling.
      - name: Build test archive
        run: >-
          cargo nextest run
          --no-run
          --workspace
          --features "${{ matrix.features }}"
          --lib --bins
          --archive-file nextest-archive.tar.zst

      - uses: actions/upload-artifact@v4
        with:
          name: nextest-archive-${{ matrix.os }}-${{ matrix.allocator }}
          path: nextest-archive.tar.zst
          retention-days: 1

  # ── Tier 2b: partitioned tests ───────────────────────────────────────────
  # Downloads the archive produced by the build job and runs 4 parallel
  # partitions per OS/allocator combination.  Each partition is an
  # independent job — all 20 jobs (4 partitions × 5 build targets) fan out
  # in parallel.
  test:
    name: Test (${{ matrix.os }}, ${{ matrix.allocator }}, ${{ matrix.partition }}/4)
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    needs: [build]
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        allocator: [system, mimalloc]
        partition: [1, 2, 3, 4]
        exclude:
          - os: windows-latest
            allocator: mimalloc

    steps:
      - uses: dtolnay/rust-toolchain@nightly

      - uses: taiki-e/install-action@v2
        with:
          tool: nextest

      - uses: actions/download-artifact@v4
        with:
          name: nextest-archive-${{ matrix.os }}-${{ matrix.allocator }}

      - name: Run test partition ${{ matrix.partition }}/4
        run: >-
          cargo nextest run
          --archive-file nextest-archive.tar.zst
          --partition count:${{ matrix.partition }}/4
          --no-fail-fast

  # Doctests cannot be archived; run them separately on each OS.
  # They depend on the build job for cache warm-up but do not use the archive.
  doctest:
    name: Doctests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    needs: [changes, quality]
    if: |
      needs.changes.outputs.rust == 'true' ||
      github.event_name == 'push' ||
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch'
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: llvm-tools-preview

      - uses: Swatinem/rust-cache@v2
        with:
          # Share the cache key with the system-allocator build on the same OS
          # so the compiler cache is warm when this job runs.
          shared-key: "build-${{ matrix.os }}-system"
          save-if: false
          cache-on-failure: true

      - name: Run doctests
        run: >-
          cargo test
          --workspace
          --doc
          --features "simd-auto,schema-validation,compression,http-server,http-client,websocket-client,websocket-server"

  # Coverage runs on ubuntu only; does not wait for the cross-platform matrix.
  # Skipped when only JS files changed.
  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [changes, quality]
    if: |
      needs.changes.outputs.rust == 'true' ||
      github.event_name == 'push' ||
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: llvm-tools-preview

      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov,nextest

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "coverage"
          cache-on-failure: true

      - name: Generate workspace coverage
        run: |
          cargo llvm-cov nextest --all-features --all-targets --workspace \
            --lcov --output-path lcov.info \
            --status-level fail --final-status-level skip

      - name: Upload coverage to codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: lcov.info
          fail_ci_if_error: false

  # ── Tier 2c: WASM library tests ──────────────────────────────────────────
  # Runs in parallel with the Rust host matrix — does NOT wait for it.
  # Triggered by any Rust change (pjs-core, pjs-domain, pjs-wasm, Cargo files)
  # or explicit dispatch/push.  Skipped on JS-only PRs.
  wasm-test:
    name: WASM Library Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [changes, quality]
    if: |
      needs.changes.outputs.wasm == 'true' ||
      github.event_name == 'push' ||
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: llvm-tools-preview

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "wasm-test"
          cache-on-failure: true

      - uses: taiki-e/install-action@v2
        with:
          tool: nextest

      - name: Run pjs-wasm library tests
        run: cargo nextest run -p pjs-wasm --lib --no-fail-fast

      - name: Run pjson-rs-domain library tests
        run: cargo nextest run -p pjson-rs-domain --lib --no-fail-fast

      - name: Run doctests
        run: |
          cargo test -p pjs-wasm --doc
          cargo test -p pjson-rs-domain --doc

  # ── Tier 3: WASM artefact builds ─────────────────────────────────────────
  # Three wasm-pack targets in parallel; starts as soon as wasm-test passes.
  # Same trigger condition as wasm-test.
  wasm-build:
    name: Build WASM (${{ matrix.target }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [changes, wasm-test]
    if: |
      needs.changes.outputs.wasm == 'true' ||
      github.event_name == 'push' ||
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch'
    strategy:
      fail-fast: false
      matrix:
        target: [web, nodejs, bundler]
    env:
      WASM_PACK_CACHE_DIR: ~/.wasm-pack
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@nightly
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "wasm-build-${{ matrix.target }}"
          cache-on-failure: true

      - name: Cache wasm-pack
        uses: actions/cache@v4
        with:
          path: ${{ env.WASM_PACK_CACHE_DIR }}
          key: wasm-pack-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            wasm-pack-${{ runner.os }}-

      - uses: taiki-e/install-action@v2
        with:
          tool: wasm-pack@latest

      - name: Build WASM for ${{ matrix.target }}
        working-directory: crates/pjs-wasm
        run: |
          wasm-pack build \
            --target ${{ matrix.target }} \
            --release \
            --out-dir pkg-${{ matrix.target }}

      - uses: actions/upload-artifact@v4
        with:
          name: wasm-build-${{ matrix.target }}
          path: crates/pjs-wasm/pkg-${{ matrix.target }}/
          retention-days: 7

  # ── Tier 4: WASM post-build checks ───────────────────────────────────────
  # All three depend only on wasm-build; they run in parallel.
  # Triggered by wasm OR js changes (js-client examples live in crates/pjs-js-client).
  wasm-bundle-size:
    name: WASM Bundle Size
    needs: [changes, wasm-build]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: |
      needs.changes.outputs.wasm == 'true' ||
      github.event_name == 'push' ||
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Analyze bundle sizes
        id: bundle-size
        run: |
          echo "## WASM Bundle Size Report" > bundle-report.md
          echo "" >> bundle-report.md
          echo "| Target | Raw (KB) | Gzipped (KB) | Status |" >> bundle-report.md
          echo "|--------|----------|-------------|--------|" >> bundle-report.md

          for target in web nodejs bundler; do
            if [ -f "artifacts/wasm-build-$target/pjs_wasm_bg.wasm" ]; then
              raw_size=$(($(wc -c < "artifacts/wasm-build-$target/pjs_wasm_bg.wasm") / 1024))
              gzipped_size=$(($(gzip -c < "artifacts/wasm-build-$target/pjs_wasm_bg.wasm" | wc -c) / 1024))

              status="PASS"
              if [ $raw_size -gt 200 ] || [ $gzipped_size -gt 80 ]; then
                status="WARNING"
              fi

              echo "| $target | $raw_size | $gzipped_size | $status |" >> bundle-report.md
            fi
          done

          cat bundle-report.md

      - uses: actions/upload-artifact@v4
        with:
          name: bundle-size-report
          path: bundle-report.md
          retention-days: 30

      - name: Comment PR with bundle sizes
        if: github.event_name == 'pull_request'
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('bundle-report.md', 'utf8');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: report
            });

  wasm-node-example:
    name: Node.js Example Test
    needs: [changes, wasm-build]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: |
      needs.changes.outputs.wasm == 'true' ||
      needs.changes.outputs.js == 'true' ||
      github.event_name == 'push' ||
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: wasm-build-web
          path: crates/pjs-js-client/examples/browser-wasm/pkg

      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Run and verify Node.js example
        working-directory: crates/pjs-js-client/examples/browser-wasm
        run: |
          node example.js | grep -q "Example 1: Basic Usage" || (echo "Example failed" && exit 1)
          node example.js | grep -q "Generated" || (echo "No frame generation detected" && exit 1)

  wasm-package-validation:
    name: NPM Package Validation
    needs: [changes, wasm-build]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: |
      needs.changes.outputs.wasm == 'true' ||
      github.event_name == 'push' ||
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: wasm-build-web
          path: wasm-pkg

      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Validate package.json fields
        run: |
          node -e "
            const pkg = require('./wasm-pkg/package.json');
            const required = ['name', 'version', 'files', 'main', 'types'];
            for (const field of required) {
              if (!pkg[field]) {
                console.error('Missing required field: ' + field);
                process.exit(1);
              }
            }
          "

      - name: Validate TypeScript definitions
        run: |
          grep -q "class PjsParser" wasm-pkg/pjs_wasm.d.ts || (echo "Missing PjsParser class" && exit 1)
          grep -q "class PriorityConstants" wasm-pkg/pjs_wasm.d.ts || (echo "Missing PriorityConstants" && exit 1)
          grep -q "class PriorityConfigBuilder" wasm-pkg/pjs_wasm.d.ts || (echo "Missing PriorityConfigBuilder" && exit 1)
          grep -q "export function version" wasm-pkg/pjs_wasm.d.ts || (echo "Missing version function" && exit 1)

      - uses: actions/upload-artifact@v4
        with:
          name: validated-wasm-package
          path: wasm-pkg/
          retention-days: 7

  # ── Security (independent, no Rust build required) ────────────────────────
  security-osv:
    name: OSV Security Scan
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.event_name == 'merge_group'
    permissions:
      actions: read
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: google/osv-scanner-action/osv-scanner-action@v2.3.5

  # ── Single gate for branch protection ────────────────────────────────────
  # Keys off this job name in branch protection settings.
  # Skipped jobs (wasm/rust on JS-only PRs, security on push) are treated as
  # success — the gate fails only on actual failure or cancellation.
  ci-success:
    name: CI Success
    needs:
      - changes
      - quality
      - build
      - test
      - doctest
      - coverage
      - wasm-test
      - wasm-build
      - wasm-bundle-size
      - wasm-node-example
      - wasm-package-validation
      - security-osv
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check required jobs
        run: |
          check() {
            local job=$1 result=$2
            if [[ "$result" == "failure" || "$result" == "cancelled" ]]; then
              echo "Job '$job' did not pass (result: $result)"
              exit 1
            fi
          }
          check quality                   "${{ needs.quality.result }}"
          check build                     "${{ needs.build.result }}"
          check test                      "${{ needs.test.result }}"
          check doctest                   "${{ needs.doctest.result }}"
          check coverage                  "${{ needs.coverage.result }}"
          check wasm-test                 "${{ needs.wasm-test.result }}"
          check wasm-build                "${{ needs.wasm-build.result }}"
          check wasm-bundle-size          "${{ needs.wasm-bundle-size.result }}"
          check wasm-node-example         "${{ needs.wasm-node-example.result }}"
          check wasm-package-validation   "${{ needs.wasm-package-validation.result }}"
          check security-osv              "${{ needs.security-osv.result }}"
          echo "All required jobs passed or were skipped."
